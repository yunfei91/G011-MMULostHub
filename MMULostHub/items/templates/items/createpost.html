{% load static %}
<!DOCTYPE html>
<html>
    <head> 
        <!-- Cropper CSS/JS Tool to crop photo -->
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.css"/>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.js"></script>


        <!-- CSS Links -->
        <link rel="stylesheet" href="{% static 'items/css/createpost.css' %}">
        <link rel="stylesheet" href="{% static 'items/css/map.css' %}">
        <link rel="stylesheet" href="{% static 'items/css/popup.css' %}">

        <!-- JS Links -->
        <script src="{% static 'items/js/popup.js' %}" defer></script>
        <script src="{% static 'items/js/map.js' %}" defer></script>
        <script src="{% static 'items/js/createpost.js' %}" defer></script>                <!-- differ = load complete html then load java -->
        
        <title> 
            MMU Lost Hub
        </title>
        
        <!-- yt added -->
        <!-- Prevent browser cache, user cannot press back to access previous page -->
        <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"> 
        <!-- Older browser cache prevention -->
        <meta http-equiv="Pragma" content="no-cache">
        <!-- Expire page immediately -->
        <meta http-equiv="Expires" content="0">

    </head>

    <body>
        <header>
            <img src="{% static 'images/MMU Logo' %}" alt="MMU Logo" class = "mmu-logo">
            <img src="{% static 'images/Web Logo' %}" alt="MMU Lost Hub Logo" class="losthub-logo">
        </header>

        <!-- ================================================== -->
        <!--            Dropdown Menu Navigation                -->
        <!-- ================================================== -->
        <div class = "dropdown-nav">
            <nav>
                Menu button
            </nav>
            
            <div class = "dropdown-content">
                <a href = "{% url 'mainPage' %}"> Home </a>
                <a href = "{% url 'lost_posts' %}"> Lost Post </a>                 
                <a href = "{% url 'found_posts' %}"> Found Post </a>                
                <a href = "{% url 'profile' %}"> Profile </a>                   
                <a href = "{% url 'feedback_form' %}"> Feedback/Report </a>
                <a href="{% url 'logout' %}"> Logout </a>                   
            </div>
        </div>

        <!-- ================================================== -->
        <!--            Create Post Section                     -->
        <!-- ================================================== -->
        <div class = "create-post-box">
            <h2>
                CREATE POST
            </h2>

            <!-- ================================================== -->
            <!--    Backend to Check Which Popup Msg To Display     -->
            <!-- ================================================== -->
            {% if messages %}
                <script>                                                    // js code
                    window.addEventListener("load", function () {

                        //loop messages inside createpost.js
                        {% for message in messages %} 

                            {% if message.tags == "success" %}     

                                // true = auto close popup / 2000 = 2 seconds
                                showPopup("Success", "{{ message }}", true, 2000);

                            {% else %}
                                // show info = show error message 
                                showPopup("Info", "{{ message }}");

                            {% endif %}

                        {% endfor %}
                    });
                </script>
            {% endif %}

            <form method = "POST" enctype = 'multipart/form-data'>      <!-- enctype add to upload photo -->
                {% csrf_token %}                                        <!-- Django security protection code -->
                
                <!-- ============================== -->
                <!--        Select Post Type        -->
                <!-- ============================== -->
                <label> Type: </label>
                <select name = "post_type">

                    <!-- Default -->
                    <option value = ""> Select Post Type </option>

                    <!-- Select Lost Post-->
                    <option value = "lost" {% if post_data.post_type == "lost" %} selected {% endif %}> 
                        Lost Post 
                    </option>

                    <!-- Select Found Post-->
                    <option value = "found" {% if post_data.post_type == "found" %} selected {% endif %}> 
                        Found Post 
                    </option>

                </select>

                <br><br>

                <!-- ================================================== -->
                <!--            Date Time Selection                     -->
                <!-- ================================================== -->
                <label> Date Time: </label>
                <input type = "datetime-local" name = "post_datetime" value = "{{ post_data.post_datetime }}">

                <br><br> 

                <!-- ================================================== -->
                <!--            Image Upload Section                    -->
                <!-- ================================================== -->
                <label> Upload Item Image: </label>
                
                <input type = "file" id = "post_image" name = "userposts_images" accept = "image/*" hidden>                 <!-- Input image field / accept = "image/* (limit oni can choose photo) / id is for java-->
                
                <button type="button" id="uploadBtn">
                    Upload Image
                </button>
                
                <!-- ====================================== -->
                <!--          Crop Image Modal             -->
                <!-- ====================================== -->
                <div id ="crop_modal" class = "crop-modal">

                    <!-- close button -->
                    <span id="close_crop" class="imgclose_button">
                        &times;
                    </span>

                    <div id ="crop_container" class = "crop-container">

                        <!-- Display photo uploaded to crop -->
                        <img id = 'crop_preview' class = "crop-preview">

                        <button type="button" id="confirmCropBtn">
                            Crop Image
                        </button>
                    
                    </div>
                </div>

                <div id = "imagePreview_container" class = "imagePreview-container">

                    <img id="image_preview" class = "image-preview">

                </div>

                <input type="hidden" name="cropped_image" id="cropped_image">

                <br><br>

                <!-- ================================================== -->
                <!--            Item Category Selection                 -->
                <!-- ================================================== -->
                <label> Item Category: </label>
                <select name = "post_itemcategory">

                    <!-- Default -->
                    <option value = ""> Select Category </option>

                    <!-- Show (modal.py) and Select Item Categories -->
                    {% for value, label in item_categories %}
                        <option value="{{ value }}" {% if post_data.post_itemcategory == value %} selected {% endif %}>
                            {{ label }}
                        </option>
                    {% endfor %}
                </select>

                <br><br>

                <!-- ================================================== -->
                <!--            Location Selection                      -->
                <!-- ================================================== -->
                <label> Location: </label>
                <select name = "post_location" id = "post_location">

                    <!-- Default -->
                    <option value =""> Select Location </option>
                    
                    <!-- Show (migration 0002) and Select Locations -->
                    {% for loc in locations %}
                        <option value="{{loc.location_code}}" {% if post_data.post_location == loc.location_code %} selected {% endif %}>
                            {{loc.location_name}}
                        </option>
                    {% endfor %}

                </select>

                <br><br>

                <!-- ================================================== -->
                <!--            Map Select Location                     -->
                <!-- ================================================== -->
                <p>Click Map to choose location: </p>
                <div class = "map_box">
                    <img src="{% static 'images/map-img.jpg' %}" id="smallMap" class="smallMap">
                    <div id = "smallMap_marker" class = "smallMap-marker"> 📍 </div>
                </div>

                <br><br>

                <!-- ================================================== -->
                <!--                    Description                     -->
                <!-- ================================================== -->
                <label> Item Description: </label>

                <!-- placeholder = display text at text area -->
                <textarea name = "post_description" placeholder = " Describe the item or give it a name ^-^ ">
                    {{ post_data.post_description }}
                </textarea>

                <!-- ================================================== -->
                <!--            Map Modal Section                       -->
                <!-- ================================================== -->
                <div id="map_modal" class="map_modal">

                    <div class="mapmodal_content">

                        <!-- Close map button -->
                        <span id="close_map" class="mapclose_button">
                            &times;   <!-- x icon -->
                        </span>

                        <!-- Scroller -->
                        <div class="map-scroll-container">

                            <div id = "location_label" class = "location_label"></div>

                            <div class="big-map-box">
    
                                <img
                                    src="{% static 'images/map-img.jpg' %}"
                                    id="bigMap"
                                    class="bigMap"
                                    alt="MMU Big Map"
                                >

                                <div id="bigMap_marker" class="bigMap-marker">
                                    📍
                                </div>

                            </div>

                        </div>

                    </div>

                </div>

                <br><br>

                <!-- onclick = will run a confirm popup first from createpost.js -->
                <button type = "button" onclick = "confirmCreate(event)">
                        Create Post 
                </button>

            </form>
        </div>

        <!-- ================================================== -->
        <!--             Popup Box Modal                        -->
        <!-- ================================================== -->
        <div id = "popup" class = "popup hidden">
            <div class = "popup-box">
                <h3 id = "popup-title"></h3>
                <p id = "popup-message"></p>
                <button id = "popup-confirm"> OK </button>
                <button id = "popup-cancel"> Cancel </button>
            </div>
        </div>

    </body>

    <footer>
        <p>
            © 2026 MMU Lost Hub
            <br>
            Designed by: Kho Yee Theng / Tan Yun Fee / Lim Tze Ying
        </p>
    </footer>
</html>
