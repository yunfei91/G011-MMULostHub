<!DOCTYPE html>
<html>

<head>
    <title>Report User</title>
</head>

<body>

<h2>Report User</h2>
<p> Reporting User: {{ reported_user.username }}</p>

<form method="POST" enctype="multipart/form-data" action="{% url 'report_user' reported_user.id %}">
    {% csrf_token %}
    <input type="hidden" name="user_id" value="{{ reported_user.id }}">

    <!-- Reason -->
    <label>Reason:</label>
    <br>
    <textarea name="comments" rows="5" cols="40" required></textarea>
    <br><br>

    <!-- Proof Image -->
    <label>Upload Proof:</label>
    <br>
     <input type="file" name="image" required accept="image/*">
    <br><br>

    <button type="submit" onclick="return checkProofImage()">
    Submit Report
    </button>
</form>
<script>
function checkProofImage() {
    const imageInput = document.querySelector('input[name="image"]');

    if (!imageInput.files || imageInput.files.length === 0) {
        alert("Please upload proof image before submitting.");
        imageInput.focus();
        return false;
    }

    return confirm("Are you sure you want to submit?");
}
</script>
</body>
</html>
