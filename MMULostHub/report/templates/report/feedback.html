{% load static %}
<!DOCTYPE html>
<html>
    <head>
        <!-- yt added -->
        <link rel="stylesheet" href="{% static 'report/css/feedback.css' %}">
        <link rel="stylesheet" href="{% static 'report/css/popup.css' %}">

        <script src="{% static 'items/js/header.js' %}" defer></script>
        <script src="{% static 'items/js/logout.js' %}" defer></script>
        <script>
            window.DJANGO_LOGOUT_URL = "{% url 'logout' %}";
            const CURRENT_USER_ID = "{{ request.user.id|default:'' }}";
        </script>

        <title> 
            MMU Lost Hub 
        </title>
        
        <!-- yt added -->
        <!-- Prevent browser cache, user cannot press back to access previous page -->
        <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"> 
        <!-- Older browser cache prevention -->
        <meta http-equiv="Pragma" content="no-cache">
        <!-- Expire page immediately -->
        <meta http-equiv="Expires" content="0">

    </head>
    <body>
        <div class="whole-page">
            <header>
                <div class="header-left"> <!-- yt adjusted for css uses-->              
                    <img src="{% static 'images/MMULogo.png' %}" alt="MMU Logo" class="mmu-logo">
                    <img src="{% static 'images/WebLogo-header.png' %}" alt="MMU Logo" class="losthub-logo">
                </div>

                <div class="header-right"> <!-- yt adjusted for css uses-->
                    <!-- Home icon -->
                    <a href="{% url 'mainPage' %}" class="home-icon">
                        <img src="{% static 'images/HomeIcon.png' %}" alt="Home">
                    </a>

                    <a href="{% url 'chat_inbox' %}" class="chat-icon">
                        <img src="{% static 'images/ChatIcon.png' %}" alt="Chat">
                    </a>

                    <!-- Menu button --> <!-- yt adjusted for css uses-->
                    <button type="button" class="menu-icon" onclick="toggleMenu()">
                        <span></span>
                        <span></span>
                        <span></span>
                    </button>
                </div>
            </header>

            <div id="overlay" class="overlay"></div> <!-- yt adjusted for css uses-->

            <!-- ================================================== -->
            <!--            Dropdown Menu Navigation                -->
            <!-- ================================================== -->
            <div class = "dropdown-nav">
                
                <nav id="menu" class="menu"> <!-- yt adjusted for css uses-->
                    <ul>
                        <li>
                            <a href="{% url 'lost_posts' %}"> Lost Post </a>  
                        </li>
                        <li>
                            <a href="{% url 'found_posts' %}"> Found Post </a>
                        </li>
                        <li>
                            <a href="{% url 'profile' %}"> Profile </a>
                        </li>
                        <li>
                            <a href="{% url 'feedback_form' %}?next={{ request.get_full_path|urlencode }}"> Feedback </a>
                        </li>
                        <li class="logout">
                            <a href="javascript:void(0);" onclick="showLogoutConfirm()">Logout</a>
                        </li>
                    </ul>
                </nav>
            </div>
            
            <div class="content">

                <div class="feedback-title">
                    <h2>Feedback</h2>
                    <p>Leave your comments / suggestions here!</p>
                </div>

                <div class="feedback-wrapper">
                    <form id="feedbackForm" action="{% url 'feedback_form' %}" method="POST" enctype="multipart/form-data">
                    {% csrf_token %}

                        <input type="hidden" name="next" value="{{ next_url }}">

                        <label for="comments">Your Feedback</label>

                        <textarea id="comments"
                                  name="comments"
                                  placeholder="Please enter your feedback here..."
                                  rows="10"></textarea>

                        <div class="upload-group">
                            <label for="image-upload">Upload Image (optional)</label>

                            <input
                                type="file"
                                id="image-upload"
                                name="image-upload"
                                accept="image/*">

                            <div id="preview-container">

                                <button
                                    type="button"
                                    id="remove-image"
                                    aria-label="Remove image">
                                    ×
                                </button>

                                <img id="preview-image" alt="Preview">

                            </div>

                        </div>

                        <div class="button-group">
                            <button 
                                type="button"
                                class="btn"
                                onclick="openFeedbackSubmitPopup()">
                                SUBMIT
                            </button>
                        </div>
                    </form>
                </div>

            </div>

            <div id="feedbackErrorPopup" class="popup-modals">
                <div class="popup-boxs">
                    <p>Please write something before submitting.</p>

                    <div class="popup-buttons">
                        <button type="button" onclick="closeFeedbackErrorPopup()">OK</button>
                    </div>
                </div>
            </div>

            <div id="feedbackSubmitPopup" class="popup-modals">
                <div class="popup-boxs">
                    <p>Are you sure you want to submit?</p>

                    <div class="popup-buttons">
                        <button
                            type="button"
                            onclick="submitFeedbackForm()">
                            Yes
                        </button>

                        <button 
                            type="button"
                            onclick="closeFeedbackSubmitPopup()">
                            Cancel
                        </button>
                    </div>
                </div>
            </div>

            <!-- yt added -->
            <!-- Confirm Logout Popup -->
            <div id="confirmPopup" class="popup-modal">
                <div class="popup-box">
                    <p>Are you sure you want to logout?</p>

                    <div class="popup-btns">
                        <button onclick="confirmLogout()">Yes</button>
                        <button onclick="cancelLogout()">Cancel</button>
                    </div>
                </div>
            </div>
        </div>

        <footer>
            <p>© 2026 MMU Lost Hub<br>
        </footer>

    <script>

    const input = document.getElementById("image-upload");
    const preview = document.getElementById("preview-image");
    const container = document.getElementById("preview-container");
    const removeBtn = document.getElementById("remove-image");

    input.addEventListener("change", function () {

        if (this.files.length === 0) {
            container.style.display = "none";
            return;
        }

        preview.src = URL.createObjectURL(this.files[0]);

        container.style.display = "block";
    });

    removeBtn.addEventListener("click", function () {

        input.value = "";

        preview.src = "";

        container.style.display = "none";
    });

    function openFeedbackSubmitPopup() {
        const comments = document.getElementById("comments");

        if (comments.value.trim() === ""){
            document.getElementById("feedbackErrorPopup").classList.add("show");
            return;
        }

        document
            .getElementById("feedbackSubmitPopup")
            .classList.add("show");
    }

    function closeFeedbackSubmitPopup() {
        document
            .getElementById("feedbackSubmitPopup")
            .classList.remove("show");
    }

    function closeFeedbackErrorPopup() {
            document
            .getElementById("feedbackErrorPopup")
            .classList.remove("show");
    }

    function submitFeedbackForm() {
        document
            .getElementById("feedbackSubmitPopup")
            .classList.remove("show");
            
        document
            .getElementById("feedbackForm")
            .submit();
    }

     </script>
    </body>
</html>
