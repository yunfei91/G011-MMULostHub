<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="'UTF-8">
        <tittle>MMU Lost Hub - Feedback</tittle>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div class="container">
            <header>
                <div class="menu-icon"></div>
                <h1>MMU Lost Hub</h1>
            </header>

            <main>
                <section class="feedback-section">
                    <h2>Feedback / Report</h2>
                    <p>Leave your comments / suggestions here</p>

                    <form id="FeedbackForm">
                        <label for="comments">Your feedback:</label>

                        <textarea id="comments"  name="comments" placeholder="Please enter your feedback here..." row="10">
                        </textarea>
                        <div class="button-group">
                            <button type="submit" class="submit-btn">Submit</button>
                        </div>
                    </form>
                </section>
            </main>
        </div>
    </body>
</html>
