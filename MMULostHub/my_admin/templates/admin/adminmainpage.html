{% load static %}
<!DOCTYPE html>
<html>
    <head>
        <title>MMU Lost Hub</title>
        
        <!-- yt added -->
        <!-- Prevent browser cache, user cannot press back to access previous page -->
        <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"> 
        <!-- Older browser cache prevention -->
        <meta http-equiv="Pragma" content="no-cache">
        <!-- Expire page immediately -->
        <meta http-equiv="Expires" content="0">

        <link rel="stylesheet" href="{% static 'user/css/adminmain.css' %}">

        <script src="{% static 'items/js/logout.js' %}" defer></script>
        <script>window.DJANGO_LOGOUT_URL = "{% url 'logout' %}";</script>
    </head>

    <body>
        <div class="whole-page">
            <header>
                <div class="header-left"> <!-- yt adjusted for css uses-->              
                    <img src="{% static 'images/MMULogo.png' %}" alt="MMU Logo" class="mmu-logo">
                    <img src="{% static 'images/WebLogo-header.png' %}" alt="MMU Logo" class="losthub-logo">
                </div>

                <div class="header-right"> <!-- yt adjusted for css uses-->
                    <!-- Home icon -->
                    <a href="{% url 'admin_mainpage' %}" class="home-icon">
                        <img src="{% static 'images/homeicon.png' %}" alt="Home">
                    </a>

                    <!-- Logout button --> <!-- yt adjusted for css uses-->
                    <a href="javascript:void(0);" onclick="showLogoutConfirm()" class="logout-icon">
                        <img src="{% static 'images/logouticon.png' %}" alt="Logout">
                    </a>
                </div>
            </header>

            <main class="admin-main">

                <div class="admin-cards">

                    <a href="{% url 'admin_user' %}" class="admin-card">
                        <div class="card-icon">
                            <img src="{% static 'images/usericon.png' %}" alt="User">
                        </div>
                        <h3>User</h3>
                        <p>Manage user accounts</p>
                    </a>

                    <a href="{% url 'admin_feedback' %}" class="admin-card">
                        <div class="card-icon">
                            <img src="{% static 'images/feedbackicon.png' %}" alt="Feedback">
                        </div>
                        <h3>Feedback</h3>
                        <p>View user feedback</p>
                    </a>

                    <a href="{% url 'admin_report' %}" class="admin-card">
                        <div class="card-icon">
                            <img src="{% static 'images/reporticon.png' %}" alt="Report">
                        </div>
                        <h3>Report</h3>
                        <p>Handle reported posts</p>
                    </a>

                </div>

            </main>

            <!-- yt added -->
                <!-- Confirm Logout Popup -->
                <div id="confirmPopup" class="popup-modal">
                    <div class="popup-box">
                        <p>Are you sure you want to logout?</p>

                        <div class="popup-btns">
                            <button onclick="confirmLogout()">OK</button>
                            <button onclick="cancelLogout()">Cancel</button>
                        </div>
                    </div>
                </div>

                <!-- Success Popup -->
                <div id="successPopup" class="popup"></div>
            </div>

            <footer>
                <p>© 2026 MMU Lost Hub<br>
                <br>Designed by:<br>Kho Yee Theng<br>Tan Yun Fee<br>Lim Tze Ying</p>
            </footer>
        </div>
</body>
</html>
