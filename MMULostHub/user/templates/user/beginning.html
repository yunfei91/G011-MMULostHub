{% load static %}
<!DOCTYPE html>
<html>
    <head>
        <title>MMU Lost Hub</title>
        
        <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
        <meta http-equiv="Pragma" content="no-cache">
        <meta http-equiv="Expires" content="0">

        <link rel="stylesheet" type="text/css" href="{% static 'user/css/beginning.css' %}">
    </head>

<body>
    <div class="whole-page">
        <header>
            <img src="{% static 'images/MMU Logo.png' %}" alt="MMU Logo" class="mmu-logo">
        </header>

        <div class="content">
            <div class="banner">
                <div class="web-logo">
                    <img src="{% static 'images/Web Logo.png' %}" alt="MMU Lost Hub Logo" class="losthub-logo">
                </div>

                <div class="slogan">
                    <p>
                        What's lost can be found,<br>
                    and found can find its way back.
                    </p>

                    <nav>
                        <div class="beginning-page-action-button">
                            <a href="{% url 'user_login' %}">User Login</a>
                            <a href="{% url 'admin_login' %}">Admin Login</a>
                            <a href="{% url 'register' %}">Register</a>
                        </div>
                    </nav>
                </div>
            </div>
        </div>

        <footer>
            <p>© 2026 MMU Lost Hub<br>
            <br>Designed by:<br>Kho Yee Theng<br>Tan Yun Fee<br>Lim Tze Ying</p>
        </footer>
    </div>

    <script>
        function clearBackHistory() {
            window.history.pushState(null, "", window.location.href);
        }

        clearBackHistory();

        window.onpopstate = function () {
            alert("Please login first to continue.");
            window.location.replace("{% url 'beginning' %}");
        };

        window.addEventListener("pageshow", function (event) {
            if (event.persisted || (window.performance && window.performance.navigation.type === 2)) {
                window.location.reload();
            }
        });

        document.addEventListener("DOMContentLoaded", function () {
            const params = new URLSearchParams(window.location.search);
            if (params.has("next")) {
                alert("Please login first to continue.");
                window.history.replaceState({}, document.title, window.location.pathname);
            }
        });
    </script>
</body>
</html>
