{% load static %}
<!DOCTYPE html>
<html>
    <head>
        <title>MMU Lost Hub</title>

        <link rel="stylesheet" type="text/css" href="{% static 'user/css/email-verify.css' %}">
    </head>

    <body>
        <div class="whole-page">
            <header>
                <img src="{% static 'images/MMULogo.png' %}" alt="MMU Logo" class="mmu-logo">
            </header>

            <div class="content">
                <div class="banner">
                    <div class="web-logo">
                        <img src="{% static 'images/WebLogo-top.png' %}" alt="MMU Lost Hub Logo" class="losthub-logo-top">
                        <img src="{% static 'images/WebLogo-base.png' %}" alt="MMU Lost Hub Logo" class="losthub-logo-base">
                    </div>

                    <div class="box-input">
                        <div class="auth-panel">
                            <div class="auth-card">
                                <div class="auth-header">
                                    <button class="back-button" onclick="goBack()"><</button>
                                    <h2>Email Verification</h2>
                                </div>
                                
                                <form method="POST">
                                    {% csrf_token %} <!-- CSRF protection token -->

                                    <div class="otp-status">
                                        <div class="otp-row">
                                            <span class="otp-title">OTP Code</span>
                                            <!-- Display OTP countdown status -->
                                            <span id="otpBadge"></span>
                                        </div>
                                    </div>

                                    <div class="otp-box" id="otpBox">
                                        <input type="text" maxlength="1" class="otp-digit">
                                        <input type="text" maxlength="1" class="otp-digit">
                                        <input type="text" maxlength="1" class="otp-digit">
                                        <input type="text" maxlength="1" class="otp-digit">
                                        <input type="text" maxlength="1" class="otp-digit">
                                        <input type="text" maxlength="1" class="otp-digit">
                                    </div>
                                    
                                    <!-- Hidden input to store complete OTP from each box at frontend for backend -->
                                    <input type="hidden" name="otp" id="otpHidden">

                                    <div class="resend-status">
                                        <button class="resend-btn" type="button" id="resendBtn" {% if not can_resend %}disabled{% endif %}>
                                            Resend code
                                        </button>
                                        <!-- Display resend countdown timer -->
                                        <span id="resendBadge"></span>
                                    </div>

                                    <!-- Hidden submit button for automatic form submission -->
                                    <button type="submit" hidden></button>
                                </form>

                                <div id="errorPopup" class="popup"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <footer>
                <p>© 2026 MMU Lost Hub<br>
                <br>Designed by:<br>Kho Yee Theng<br>Tan Yun Fee<br>Lim Tze Ying</p>
            </footer>
        </div>

        <!-- Pass python to JS, after pass <script><p id="otpTimer">60</script>-->
        {{ otp_remaining|json_script:"otp-time" }}
        <!-- Pass resend countdown time from backend to JavaScript -->
        {{ resend_remaining|json_script:"resend-time" }}

        <script>
            function goBack() {
                window.location.replace("{% url 'beginning' %}")
            }

            const popup = document.getElementById("errorPopup");

            // Display popup notification
            function showPopup(msg, type = "error") {
                if (!popup) return;

                popup.innerHTML = msg;

                popup.classList.remove("error", "success");
                popup.classList.add(type, "show");

                setTimeout(() => {
                    popup.classList.remove("show");
                }, 2500);
            }

            let otpTime = 0;
            let resendTime = 0;
            
            try {
                // Initialize OTP countdown timer // Convert string to number
                otpTime = JSON.parse(document.getElementById("otp-time").textContent);
                // Initialize resend countdown timer
                resendTime = JSON.parse(document.getElementById("resend-time").textContent);
            } catch (e) {
                console.log("Timer init error", e);
            }

            // Get OTP timer and resend button elements
            const otpBadge = document.getElementById("otpBadge");
            const resendBadge = document.getElementById("resendBadge");
            const resendBtn = document.getElementById("resendBtn");

            // Get all OTP input boxes
            const inputs = document.querySelectorAll(".otp-digit");
            const hiddenInput = document.getElementById("otpHidden");
            const form = document.querySelector("form");
            const otpBox = document.getElementById("otpBox");

            // Focus first OTP input field
            if (inputs.length > 0) {
                inputs[0].focus();
            }

            // Combine OTP digits into hidden field
            function updateHidden() {
                hiddenInput.value = Array.from(inputs) // Combine OTP 6-digits
                .map(i => i.value)
                .join(""); // Merge all OTP digits into one value
            }

            inputs.forEach((input, index) => {
                
                input.addEventListener("input", (e) => { // Detect typing
                    let value = e.target.value.replace(/\D/g, ""); // Remove non-numbers
                    input.value = value;

                    if (value && index < inputs.length - 1) {
                        inputs[index + 1].focus(); // Auto move next box
                    }

                    updateHidden();

                    if (hiddenInput.value.length === 6) {
                        form.submit(); // Auto submit
                    }
                });

                // Handle keyboard navigation
                input.addEventListener("keydown", (e) => {
                    if (e.key === "Backspace" && !input.value && index > 0) { // Move back when delete
                        inputs[index - 1].focus();
                    }
                });

                input.addEventListener("paste", (e) => { // Copy and paste
                    e.preventDefault(); // Override default paste behavior

                    let data = e.clipboardData
                        .getData("text")
                        .replace(/\D/g, "")
                        .slice(0, 6); // Max 6-digits

                    inputs.forEach((box, i) => {
                        box.value = data[i] || "";
                    });

                    updateHidden();

                    const nextIndex = Math.min(data.length, 5);
                    inputs[nextIndex].focus();

                    if (data.length === 6) {
                        form.submit();
                    }
                });
            });

            // Execute after page load
            window.addEventListener("load", () => {
                // Retrieve error message from backend
                const backendError = "{{ error|escapejs }}";

                if (backendError && backendError !== "None" && backendError.trim() !== "") {
                    // Display backend validation error
                    showPopup(backendError);
                }

                if (otpBox && backendError) {
                    // Trigger shake animation on invalid OTP
                    otpBox.classList.add("shake");

                    setTimeout(() => {
                        otpBox.classList.remove("shake");
                    }, 300);
                }
            });

            function updateTimers() {
                // Update OTP and resend countdown timers
                if (otpTime > 0) {
                    // Display OTP remaining time
                    otpBadge.innerText = otpTime + " s";
                    otpBadge.classList.remove("expired");
                } else {
                    // Mark OTP as expired
                    otpBadge.innerText = "Expired";
                    otpBadge.classList.add("expired");
                }

                // Resend
                if (resendTime > 0) {
                    resendBadge.innerText = resendTime + " s";
                    // Disable resend button during cooldown
                    resendBtn.disabled = true;
                } else {
                    resendBadge.innerText = "";
                    // Enable resend button when cooldown ends
                    resendBtn.disabled = false;
                }

                otpTime--;
                resendTime--;
    
                setTimeout(updateTimers, 1000);
            }

            updateTimers();

            // Retrieve cookie value by name
            function getCookie(name) {
                let cookieValue = null;

                if (document.cookie) {
                    const cookies = document.cookie.split(';');

                    for (let cookie of cookies) {
                        cookie = cookie.trim();

                        if (cookie.startsWith(name + '=')) {
                            cookieValue = cookie.substring(name.length + 1);
                        }
                    }
                }
                return cookieValue;
            }

            // Handle resend OTP request
            resendBtn.addEventListener("click", function () {
                fetch("{% url 'resend_otp' %}", { // Send request to backend
                    method: "POST",
                    headers: {
                        "X-CSRFToken": getCookie('csrftoken'), // CSRF token for security
                        "Content-Type": "application/json"
                    },
                    credentials: "same-origin"
                })
                .then(res => res.json()) // Convert to JSON
                .then(data => {

                    if (data.error) { // Show error
                        showPopup(data.error, "error"); // Popup for error
                        return;
                    }

                    showPopup("OTP sent!", "success");

                    otpTime = 60; // Reset time
                    resendTime = 30;
                    resendBtn.disabled = true;

                    inputs.forEach(i => i.value = ""); // Clear all OTP input fields
                    inputs[0].focus();
                    hiddenInput.value = "";
                })
                .catch(err => {
                    console.error(err);
                    showPopup("Something went wrong"); // Display unexpected error message
                });
            });
        </script>
    </body>
</html>
