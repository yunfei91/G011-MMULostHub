{% load static %}
<!DOCTYPE html>
<html>

    <head>
        <title>MMU Lost Hub</title>

        <link rel="stylesheet" type="text/css" href="{% static 'user/css/admin-login.css' %}">
    
        <!-- Google Material Icons library : show/hide pass icon -->
        <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    </head>

    <body>
        <div class="whole-page">
            <header>
                <img src="{% static 'images/MMULogo.png' %}" alt="MMU Logo" class="mmu-logo">
            </header>

            <div class="content">
                <div class="banner">
                    <div class="web-logo">
                        <img src="{% static 'images/WebLogo-top.png' %}" alt="MMU Lost Hub Logo" class="losthub-logo-top">
                        <img src="{% static 'images/WebLogo-base.png' %}" alt="MMU Lost Hub Logo" class="losthub-logo-base">
                    </div>

                    <div class="box-input">
                        <div class="auth-panel">
                            <div class="auth-card">
                                <div class="auth-header">
                                    <button class="back-button" onclick="goBack()"><</button>
                                    <h2>Welcome to MMU Lost Hub</h2>
                                </div>

                                <form id="loginForm" method="POST">
                                    {% csrf_token %} <!-- CSRF protection token -->

                                    <input type="text" id="email" name="email" placeholder="Admin Email" value="{{ email }}">

                                    <!--Password-->
                                    <div class="password-box">
                                        <input type="password" id="password" name="password" placeholder="Password">
                                        <span class="show-password material-icons" onclick="showPassword('password', this)">
                                        visibility_off
                                        </span>
                                    </div>

                                    <br><br><br>
                                    <button class="login-btn" type="submit">Login</button>
                                </form>

                                <p class="switch-text">
                                    Login as User?
                                    <a href="{% url 'user_login' %}">Login Here</a>
                                </p>
                                
                                <div id="errorPopup" class="popup"></div>
                            </div>
                        </div>                        
                    </div>
                </div>
            </div>

            <footer>
                <p>© 2026 MMU Lost Hub<br>
                <br>Designed by:<br>Kho Yee Theng<br>Tan Yun Fee<br>Lim Tze Ying</p>
            </footer>
        </div>

        <script>
            function goBack() {
                window.location.replace("{% url 'beginning' %}")
            }

            // Get form and popup elements
            const form = document.getElementById("loginForm");
            const popup = document.getElementById("errorPopup");

            // Display temporary popup message
            function showPopup(msg){
                // Set popup message content
                popup.innerHTML = msg;
                popup.classList.add("show");

                // Automatically hide popup after delay
                setTimeout(() => {
                    popup.classList.remove("show");
                }, 2500);
            }

            // Validate form before submission
            form.addEventListener("submit", function(e){

                // Get user input values
                const email = document.getElementById("email").value.trim();
                const pw = document.getElementById("password").value.trim();

                // Ensure all required fields are filled
                if(!email || !pw){
                    // Prevent form submission
                    e.preventDefault();
                    showPopup("Please fill in all fields");
                    return;
                }
            });

            // Get error message from backend
            const backendError = "{{ error_message|escapejs }}";

            // Display backend error if available
            if(backendError){
                showPopup(backendError);
            }

            function showPassword(inputId, icon){
                const input = document.getElementById(inputId);

                if(input.type === "password"){
                    input.type = "text"; // Show password text
                    icon.textContent = "visibility";
                } else {
                    input.type = "password"; // Hide password text
                    icon.textContent = "visibility_off";
                }
            }
        </script>
    </body>
</html>
