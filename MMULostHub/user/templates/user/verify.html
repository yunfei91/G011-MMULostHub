<!DOCTYPE html>
<html>
    <head>
        <title>MMU Lost Hub</title>
        {% load static %}
    </head>

<body>
    <div class="whole-page">
        <header>
            <img src="{% static 'images/MMU Logo' %}" alt="MMU Logo" class="mmu-logo">
        </header>

        <div class="content">
            <div class="banner">
                <div class="web-logo">
                    <img src="{% static 'images/Web Logo' %}" alt="MMU Lost Hub Logo" class="losthub-logo">
                </div>

                <div class="slogan">
                    <p>
                        What's lost can be found,<br>
                    and found can find its way back.
                    </p>
                </div>

                    <form method="POST">
                        {% csrf_token %}
                        <input type="text" name="otp" placeholder="Enter OTP">
                        <button type="submit">Verify</button>

                        {% if error %}
                            <p style="color:red;">{{ error }}</p>
                        {% endif %}
                    </form>
                    
                    <form action="{% url 'resend_otp' %}" method="post">
                        {% csrf_token %}
                        <button id="ableBtn" {% if not can_resend %}disabled{% endif %}>Resend OTP</button>

                    <p id="timer"></p>
            </div>
        </div>

        <footer>
            <p>© 2026 MMU Lost Hub<br>
            <br>Designed by:<br>Kho Yee Theng<br>Tan Yun Fee<br>Lim Tze Ying</p>
        </footer>
    </div>

    {{ remaining_time|json_script:"otp-time" }}

    <script>
        let timeLeft = 0;
        try{
            timeLeft = JSON.parse(document.getElementById("otp-time").textContent);
        } catch (e) {
            timeLeft = 0;
        }

        function updateTimer() {
            let seconds = timeLeft % 60;

            document.getElementById("timer").innerText =
                "OTP expires in: " + seconds + "s";

            if (timeLeft > 0) {
                timeLeft--;
                setTimeout(updateTimer, 1000);
            } else {
                document.getElementById("timer").innerText = "OTP expired";
                location.reload();
                
                let btn = document.getElementById("ableBtn");
                if (btn) {
                    btn.disabled = false;
                }
            }
        }

        updateTimer();
    </script>
</body>
</html>
